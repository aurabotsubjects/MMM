name = "mmm-pdf-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Binds your private R2 bucket as env.MMM_BUCKET inside worker.js.
# Replace bucket_name with your actual R2 bucket name.
[[r2_buckets]]
binding = "MMM_BUCKET"
bucket_name = "aurabotsubjects"

# These are read as env.* in worker.js. The Supabase anon key is
# meant to be public, so it's fine to keep here. Replace both values,
# and set ALLOWED_ORIGIN to your GitHub Pages URL once you know it,
# e.g. "https://your-username.github.io".
[vars]
SUPABASE_URL = "https://kxbibqezeppzjgjaowhz.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4YmlicWV6ZXBwempnamFvd2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwODcwMzksImV4cCI6MjA5OTY2MzAzOX0.oL-r0TybMVkwuWPeDH3onSJZ3envQqhHVnWduzVx9XA"
ALLOWED_ORIGIN = "https://YOUR-GITHUB-USERNAME.github.io"
